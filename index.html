<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>영상 편집 웹 도구</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.css" />
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.js"></script>
    <script>
        stlite.mount({
            requirements: ["moviepy"], // 영상 편집에 필요한 라이브러리 추가
            entrypoint: "app.py",
            files: {
                "app.py": `
import streamlit as st
# 여기에 현재 d:/2026/0301 영상편집 웹버전/app.py의 내용을 복사해서 넣으세요.
                `
            }
        }, document.getElementById("root"));
    </script>
</body>
</html>
